<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentiment Results — ClassEcho</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />

  <style>
    .stats-page { max-width: 640px; }

    .big-title {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.25rem;
    }
    .big-subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    /* Individual feedback rows */
    .feedback-list { display: flex; flex-direction: column; gap: 0.65rem; margin-top: 1.25rem; }
    .feedback-row {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .feedback-row .fr-name  { font-weight: 600; font-size: 0.88rem; flex: 1; }
    .feedback-row .fr-roll  { font-size: 0.72rem; color: var(--muted); }
    .feedback-row .fr-avg   { font-size: 0.82rem; color: var(--accent2); font-weight: 700; }
    .feedback-row .fr-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2rem 0.55rem;
      border-radius: 99px;
      background: rgba(255,255,255,0.07);
    }
    .fr-badge.Positive { color: var(--positive); border: 1px solid var(--positive); }
    .fr-badge.Neutral  { color: var(--neutral);  border: 1px solid var(--neutral); }
    .fr-badge.Negative { color: var(--negative); border: 1px solid var(--negative); }

    .refresh-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.4rem 0.9rem;
      border-radius: 99px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: 1.25rem;
    }
    .refresh-btn:hover { color: var(--text); border-color: var(--accent); }

    .back-link {
      display: inline-block;
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 1rem;
    }
    .back-link:hover { color: var(--accent); }
  </style>
</head>
<body>
<div class="wrapper stats-page">

  <a href="/" class="back-link">← Back to Form</a>

  <div class="big-title">📊 Sentiment Results</div>
  <div class="big-subtitle" id="session-label">
    Session: {{ session_id if session_id else 'All Sessions' }}
  </div>

  <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>

  <!-- Summary stats chips -->
  <div class="stats-row" style="margin-bottom:1.25rem">
    <div class="stat-chip">
      <span class="chip-label">Total Responses</span>
      <span class="chip-value" id="stat-total">—</span>
    </div>
    <div class="stat-chip">
      <span class="chip-label">Avg. Rating</span>
      <span class="chip-value" id="stat-avg">—</span>
    </div>
    <div class="stat-chip">
      <span class="chip-label">Dominant</span>
      <span class="chip-value" id="stat-dominant">—</span>
    </div>
  </div>

  <!-- Sentiment Pie Chart Card -->
  <div class="card sentiment-card" style="padding:1.5rem; margin-bottom:1.25rem">
    <div class="sc-title">💬 Sentiment Analysis</div>
    <div class="chart-and-legend">
      <div class="chart-wrap">
        <canvas id="sentiment-chart"></canvas>
        <div class="chart-center-label">
          <span class="pct" id="center-pct">—</span>
          <span class="lbl" id="center-lbl">—</span>
        </div>
      </div>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-left"><span class="legend-dot pos"></span><span class="legend-name">Positive</span></div>
          <span class="legend-pct" id="legend-pos">—</span>
        </div>
        <div class="legend-item">
          <div class="legend-left"><span class="legend-dot neu"></span><span class="legend-name">Neutral</span></div>
          <span class="legend-pct" id="legend-neu">—</span>
        </div>
        <div class="legend-item">
          <div class="legend-left"><span class="legend-dot neg"></span><span class="legend-name">Negative</span></div>
          <span class="legend-pct" id="legend-neg">—</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Per-submission breakdown -->
  <div class="card" style="padding:1.5rem">
    <div class="sc-title">📝 Individual Submissions</div>
    <div class="feedback-list" id="feedback-list">
      <p style="color:var(--muted);font-size:0.85rem">Loading…</p>
    </div>
  </div>

</div>

<script>
  const SESSION_ID = "{{ session_id | safe }}";
  let chartInstance = null;

  function renderChart(pos, neu, neg) {
    const ctx = document.getElementById('sentiment-chart').getContext('2d');
    if (chartInstance) chartInstance.destroy();

    const total = pos + neu + neg || 1;
    const posP = Math.round((pos / total) * 100);
    const neuP = Math.round((neu / total) * 100);
    const negP = 100 - posP - neuP;

    chartInstance = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Positive', 'Neutral', 'Negative'],
        datasets: [{
          data: [pos, neu, neg],
          backgroundColor: ['#4caf50', '#ffc107', '#f44336'],
          borderColor: '#1a1d27',
          borderWidth: 4,
          hoverOffset: 10,
        }]
      },
      options: {
        cutout: '72%',
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: { label: c => ` ${c.label}: ${Math.round((c.parsed/total)*100)}%` },
            backgroundColor: '#22263a',
            titleColor: '#e2e8f0',
            bodyColor: '#8892a4',
            cornerRadius: 8,
            padding: 10,
          }
        },
        animation: { animateRotate: true, duration: 900, easing: 'easeInOutCubic' }
      }
    });

    const maxPct = Math.max(posP, neuP, negP);
    let dominant, dominantPct;
    if (maxPct === posP)      { dominant = 'Positive'; dominantPct = posP; }
    else if (maxPct === neuP) { dominant = 'Neutral';  dominantPct = neuP; }
    else                      { dominant = 'Negative'; dominantPct = negP; }

    document.getElementById('center-pct').textContent = `${dominantPct}%`;
    document.getElementById('center-lbl').textContent = dominant;
    document.getElementById('legend-pos').textContent = `${posP}%`;
    document.getElementById('legend-neu').textContent = `${neuP}%`;
    document.getElementById('legend-neg').textContent = `${negP}%`;
    document.getElementById('stat-dominant').textContent = dominant;
    document.getElementById('stat-dominant').style.color =
      dominant === 'Positive' ? '#4caf50' : dominant === 'Neutral' ? '#ffc107' : '#f44336';
  }

  async function loadData() {
    // ── Aggregate stats ──
    const url = '/api/feedback/stats' + (SESSION_ID ? `?sessionId=${encodeURIComponent(SESSION_ID)}` : '');
    const stats = await fetch(url).then(r => r.json());
    const c = stats.counts || {};
    document.getElementById('stat-total').textContent = stats.total;
    document.getElementById('stat-avg').textContent = (stats.averageRating || 0).toFixed(2) + ' / 5';
    renderChart(c.Positive || 0, c.Neutral || 0, c.Negative || 0);

    // ── Per-submission list ──
    const docsUrl = '/api/feedback/list' + (SESSION_ID ? `?sessionId=${encodeURIComponent(SESSION_ID)}` : '');
    try {
      const docs = await fetch(docsUrl).then(r => r.json());
      const listEl = document.getElementById('feedback-list');
      if (!docs.length) { listEl.innerHTML = '<p style="color:var(--muted);font-size:0.85rem">No submissions yet.</p>'; return; }
      listEl.innerHTML = docs.map(d => `
        <div class="feedback-row">
          <div style="flex:1">
            <div class="fr-name">${d.studentName}</div>
            <div class="fr-roll">${d.rollNo}</div>
            ${d.remark ? `<div style="font-size:0.78rem;color:var(--muted);margin-top:0.2rem">"${d.remark.slice(0,80)}${d.remark.length>80?'…':''}"</div>` : ''}
          </div>
          <span class="fr-avg">★ ${d.averageRating}</span>
          <span class="fr-badge ${d.sentiment}">${d.sentiment}</span>
        </div>
      `).join('');
    } catch {
      document.getElementById('feedback-list').innerHTML =
        '<p style="color:var(--muted);font-size:0.85rem">Could not load individual submissions.</p>';
    }
  }

  loadData();
</script>
</body>
</html>
